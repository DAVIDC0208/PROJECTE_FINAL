<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>St. Homes — Beques</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="beques.css" />
  </head>
  <body class="pagina-beques">

    <nav>
      <a href="index.html" class="nav-logo">
        <img src="images/St.homes_logo.png" alt="St. Homes logo" style="height: 100px; width: auto;" />
        St. Homes
      </a>
      <ul class="nav-enllacos">
        <li><a href="index.html#oferim">Què oferim</a></li>
        <li><a href="index.html#nosotros">Historia</a></li>
        <li><a href="index.html#contacto">Contacte</a></li>
      </ul>
      <div class="nav-accio">
        <a href="beques.html" class="boto boto-primari">Consultar Beques</a>
      </div>
    </nav>

    <div class="beques-fons">
      <div class="beques-fons-gradient"></div>
    </div>

    <main class="beques-main">
      <div class="login-card">
        <div class="login-cap">
          <img src="images/St.homes_logo.png" alt="St. Homes logo" style="height: 60px; width: auto; margin-bottom: 0.75rem;" />
          <h2>Accés a Beques</h2>
          <p>Inicia sessió per consultar les beques disponibles</p>
        </div>

        <div class="login-cos">
          <div class="grup-formulari">
            <label for="email">Correu electrònic</label>
            <input type="email" id="email" placeholder="tu@email.com" />
          </div>
          <div class="grup-formulari">
            <label for="password">Contrasenya</label>
            <input type="password" id="password" placeholder="••••••••" />
          </div>
          <div class="login-opcions">
            <label class="recordar">
              <input type="checkbox" /> Recorda'm
            </label>
            <a href="#" class="oblidat">Has oblidat la contrasenya?</a>
          </div>
          <button class="boto boto-primari login-boto">Iniciar sessió</button>
          <p class="login-registre">
            No tens compte? <a href="#">Registra't aquí</a>
          </p>
        </div>
      </div>
    </main>

  </body>
</html>
